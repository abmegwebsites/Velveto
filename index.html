<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Velveto</title>
    <script>
      window.addEventListener('error', function(e) {
        if (e.message === 'Script error.' || (e.filename && (e.filename.indexOf('youtube.com') !== -1 || e.filename.indexOf('ytimg.com') !== -1))) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return true;
        }
      }, true);
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && (String(e.reason).includes('youtube') || String(e.reason).includes('ytplayer') || String(e.reason).includes('Script error.'))) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
